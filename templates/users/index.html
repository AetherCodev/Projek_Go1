<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard</title>
</head>
<body>
    <a href="/users/profil">Profil</a>
    <h1>Daftar Produk</h1>
    {{ if .Error }}
        <p style="color:red">{{ .Error }}</p>
    {{ end }}   
    <table border="1">
        <tr>    
            <th>No</th>
            <th>Nama Produk</th>
            <th>Harga</th>
            <th>Stok</th>
        </tr>
        {{ if .Produk }}
            {{ range $i, $p := .Produk }}
            <tr>
                <td>{{ $i }}</td>
                <td>{{ $p.NamaProduk}}</td>
                <td>{{ $p.Harga }}</td>
                <td>{{ $p.Stok }}</td>
            </tr>
            {{ end }}
        {{ else }}
        <tr>
            <td colspan="5">Belum ada produk!</td>
        </tr>
        {{ end }}
    </table>
</body>
</html>
